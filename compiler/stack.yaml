# Resolver to choose a 'specific' stackage snapshot or a compiler version.
# A snapshot resolver dictates the compiler version and the set of packages
# to be used for project dependencies.

# NOTE: do not forget to update homebrew/Formula/acton.rb with the version of
# GHC that corresponds to the stack LTS release, like lts-18.28 -> ghc@8.10
# lts-23.28 uses GHC 9.8.4. GHC 9.6.6 had an aarch64 RTS crash where the GC
# could follow a NULL closure pointer (GHC #24791, black holes in large
# objects); 9.6.7 reduced it and 9.8.4 eliminates it. It surfaced as rare
# compiler segfaults on arm64 (Linux and macOS), e.g. building optional-chaining
# code, and was exposed/amplified by binary layout (the static LMDB link).
snapshot: lts-23.28

# User packages to be built.
# Various formats can be used as shown in the example below.
#
# packages:
# - some-directory
# - https://example.com/foo/bar/baz-0.0.2.tar.gz
# - location:
#    git: https://github.com/commercialhaskell/stack.git
#    commit: e7b331f14bcffb8367cd58fbfc8b40ec7642100a
# - location: https://github.com/commercialhaskell/stack/commit/e7b331f14bcffb8367cd58fbfc8b40ec7642100a
#   extra-dep: true
#  subdirs:
#  - auto-update
#  - wai
#
# A package marked 'extra-dep: true' will only be built if demanded by a
# non-dependency (i.e. a user package), and its test suites and benchmarks
# will not be run. This is useful for tweaking upstream packages.
packages:
- diagnose
- lib
- acton
- lsp-server
# Dependency packages to be pulled from upstream that are not in the resolver
# (e.g., acme-missiles-0.3)
# extra-deps: []
extra-deps:
  - Cabal-3.10.3.0
  - Cabal-syntax-3.10.3.0
  - dir-traverse-0.2.3.0
  - directory-1.3.8.5
  - filepath-1.4.300.1
  - fsnotify-0.3.0.1@sha256:58bb530d7acf93eb4ed69473e32a1485581815f04f69dfc8a278523781ba49dd,2988
  - lsp-2.7.0.0
  - lsp-types-2.3.0.0
  - parsec-3.1.17.0@sha256:8407cbd428d7f640a0fff8891bd2f7aca13cebe70a5e654856f8abec9a648b56
  - process-1.6.19.0
  - tasty-1.5.3
  - time-1.12.2
  - unix-2.8.2.1
  - Win32-2.14.2.2

# Override default flag values for local packages and extra-deps
# flags: {}

# Extra package databases containing global packages
# extra-package-dbs: []

extra-include-dirs:
  - ../bdeps/out/include
extra-lib-dirs:
  - ../bdeps/out/lib

# Control whether we use the GHC we find on the path
# NOTE: this is disabled so we can use a stack GHC in local dev environments but
# we rewrite this in our Homebrew recipe to use the system GHC. Do NOT remove
# this line, regexp replace matches on it!
# system-ghc: true

ghc-options:
  # Keep the Linux static-link workaround scoped to the unix package. Applying
  # -fPIC broadly makes GHC 9.8.4 Windows builds crash in generated code.
  unix: -fPIC
  lsp-types: -O0 -fexternal-interpreter
