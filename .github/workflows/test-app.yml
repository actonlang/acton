
on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string
      arch:
        required: false
        type: string
        default: "amd64"

jobs:
  test-app:
    runs-on: ubuntu-24.04${{ inputs.arch == 'arm64' && '-arm' || '' }}
    steps:
      - name: "Install gdb"
        run: |
          sudo apt update
          sudo apt install -y gdb
      - name: "Download .deb files"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact="acton-debs-${{ inputs.arch }}"
          for attempt in 1 2 3; do
            rm -rf deb
            if gh run download "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$artifact" --dir .; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
      - name: "Install acton from .deb"
        run: |
          sudo apt install -y ./deb/acton_*.deb
          acton version
      - name: "Clone app repo"
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo_url }}
          path: app
      - name: "Compile acton program"
        run: |
          cd app
          acton build
          acton test
          acton test perf
